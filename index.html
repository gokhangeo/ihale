<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İHALE TAKİP</title>
    
    <!-- PWA Kodları Başlangıcı -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('SW Başarılı:', reg.scope))
            .catch(err => console.log('SW Hatası:', err));
        });
      }
    </script>
    <!-- PWA Kodları Bitişi -->

    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>'>
    
    <!-- Diğer kütüphaneler -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            margin: 0;
            /* Arka plan rengi canvas tarafından sağlanacak */
        }

        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #main-app-container { display: none; padding: 20px; background-color: #f4f7f6;}
        .container { max-width: 1800px; margin: 0 auto; background-color: #ffffff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px; }
        .copyright { text-align: center; margin-top: -15px; margin-bottom: 25px; font-size: 12px; color: #6c757d; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s ease, color 0.3s ease; display: flex; align-items: center; gap: 8px; }
        button:hover { opacity: 0.9; }
        button.danger { background-color: #dc3545; }
        button.success { background-color: #28a745; }
        button.info { background-color: #17a2b8; }
        button.warning { background-color: #ffc107; color: #212529; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; opacity: 0.7; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
        th { background-color: #007bff; color: white; font-size: 14px; position: sticky; top: 0; z-index: 2;}
        tr:nth-child(even) { background-color: #f2f2f2; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[readonly], select[disabled] { background-color: #e9ecef; cursor: not-allowed; }
        .action-cell { width: 80px; text-align: center; }
        .check-cell { width: 40px; text-align: center; }
        .tamamlandi { text-decoration: red line-through; text-decoration-thickness: 2px; opacity: 0.6; background-color: #f0f0f0 !important; }
        .tamamlandi select, .tamamlandi input, .tamamlandi .select2-container,
        #notlar-table tr.tamamlandi td,
        #komisyonTable tr.tamamlandi td { 
            text-decoration: red line-through;
            text-decoration-thickness: 2px;
            opacity: 0.6;
        }
         #notlar-table tr.tamamlandi,
         #komisyonTable tr.tamamlandi {
             background-color: #f0f0f0 !important; 
         }

        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #3498db; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .select2-container--default .select2-selection--multiple { border: 1px solid #ccc; border-radius: 4px; padding: 2px; }
        .select2-container { width: 100% !important; }
        .search-container { position: relative; width: 250px; }
        #aramaKutusu, #durumFiltresi { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        #aramaKutusu { padding-right: 30px; }
        #aramaTemizleBtn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; display: none; }
        #kayitSayaci { margin-top: 10px; font-weight: bold; color: #0056b3; }

        /* Sekme Stilleri */
        .tabs-container { border-bottom: 2px solid #dee2e6; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tab-btn { background-color: #f8f9fa; color: #007bff; border: 1px solid #dee2e6; border-bottom: none; padding: 10px 15px; cursor: pointer; border-radius: 5px 5px 0 0; font-size: 16px; margin-bottom: -2px; }
        .tab-btn:hover { background-color: #e9ecef; }
        .tab-btn.active { background-color: #007bff; color: white; border-color: #007bff; }
        .table-wrapper { display: none; }
        .table-wrapper.active { display: block; }
        .table-wrapper[data-group="Tümü"] .group-header-row { background-color: #e9ecef; font-weight: bold; cursor: pointer; }
        .table-wrapper[data-group="Tümü"] .group-header-row:hover { background-color: #dde2e6; }
        .table-wrapper[data-group="Tümü"] .group-header-row td { padding: 12px; }
        .table-wrapper[data-group="Tümü"] .group-header-row h3 { margin: 0; font-size: 16px; color: #0056b3; display: flex; justify-content: space-between; align-items: center; }
        .table-wrapper[data-group="Tümü"] .group-toggle-btn { font-size: 12px; padding: 4px 8px; background-color: #6c757d; color:white; border:none; border-radius: 3px; }

        /* Sekmelere Özel Sütun Gizleme */
        .table-wrapper[data-group="GÜNCELLEME"] .col-alan,
        .table-wrapper[data-group="2/B"] .col-uygulama,
        .table-wrapper[data-group="GÜNCELLEME"] .col-uygulama,
        .table-wrapper[data-group="2/B"] .col-tarih,
        .table-wrapper[data-group="GÜNCELLEME"] .col-tarih,
        .table-wrapper[data-group="2/B"] .col-parsel,
        .table-wrapper[data-group="Müdürlük"] .col-tarih,
        .table-wrapper[data-group="GÜNCELLEME(2026)"] .col-alan,
        .table-wrapper[data-group="GÜNCELLEME(2026)"] .col-uygulama,
        .table-wrapper[data-group="GÜNCELLEME(2026)"] .col-tarih {
            display: none;
        }

        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #dc3545;
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: bottom 0.5s ease-in-out;
            z-index: 9999;
        }
        #toast.show {
            bottom: 30px;
        }

        /* Üst Kaydırma Çubuğu */
        #top-scrollbar-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            height: 20px; /* Sadece kaydırma çubuğu yüksekliği */
            display: none; /* Başlangıçta gizli */
        }
        #top-scrollbar-content {
            height: 1px; /* İçerik yüksekliği önemli değil */
        }

        #guncellemeDetailTable .col-wide { min-width: 130px; white-space: nowrap; }
        #guncellemeDetailTable .col-narrow { white-space: normal; width: 100px; }
        /* Gizlenen sütunlar için stiller */
        #guncellemeDetailTable th[data-header="İŞE BAŞLAMA"],
        #guncellemeDetailTable td[data-header="İŞE BAŞLAMA"],
        #guncellemeDetailTable th[data-header="BİTİŞ TARİHİ"],
        #guncellemeDetailTable td[data-header="BİTİŞ TARİHİ"],
        #guncellemeDetailTable th[data-header="ORMAN ASKI TARİHİ"],
        #guncellemeDetailTable td[data-header="ORMAN ASKI TARİHİ"] {
            display: none;
        }


        /* Sütun Sabitleme Stilleri */
        .sticky-col { position: -webkit-sticky; position: sticky; background-color: white; z-index: 1; }
        tr:nth-child(even) .sticky-col { background-color: #f2f2f2; }

        /* Modal Stilleri */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 10px;
            width: 90%; max-width: 600px; /* Genişletildi */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-content h3 {
            margin-top: 0; color: #0056b3;
            border-bottom: 1px solid #ccc; padding-bottom: 10px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-close-btn { display: block; margin-left: auto; }

        #personel-info-list { list-style-type: none; padding: 0; }
        #personel-info-list li { padding: 8px; border-bottom: 1px solid #eee; }
        #personel-info-list li:last-child { border-bottom: none; }
        .action-btn-cell { text-align: center; }

        /* Personel & İlçe Rapor Stilleri */
        .personel-rapor-container, .ilce-rapor-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .personel-kart, .ilce-kart {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
        }
        .personel-kart h4, .ilce-kart h4 {
            margin-top: 0;
            color: #0056b3;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }
        .personel-kart-icerik, .ilce-kart-icerik {
            display: none;
            padding-top: 10px;
        }
        .durum-grup, .uygulama-grup { /* İlçe raporu için */
            margin-bottom: 10px;
        }
        .durum-grup strong, .uygulama-grup strong {
            font-size: 14px;
        }
        .durum-grup ul, .uygulama-grup ul {
            list-style-type: none;
            padding-left: 15px;
            margin: 5px 0 0;
        }
        .durum-grup li, .uygulama-grup li {
            font-size: 12px;
            padding: 2px 0;
        }
        .uygulama-grup ul li span { /* Durumu italik yap */
             font-style: italic;
             color: #6c757d;
             margin-left: 5px;
        }
        .col-ilce {
            display: none;
        }
        .district-label {
            /* Konumlandırma artık JavaScript ile yapılıyor */
            font-size: 11px;
            font-weight: bold;
            color: white;
            padding: 1px 5px;
            border-radius: 4px;
            z-index: 3;
            pointer-events: none; /* Tıklamayı engellememesi için */
            white-space: nowrap;
        }
        .not-btn.has-note {
            background-color: #ffc107; /* Warning color */
            color: #212529;
        }
        
        /* Notlar Tablosu ve Açılır Kapanır Satır Stilleri */
        #notlar-table td {
            vertical-align: top;
            padding: 6px 8px;
        }
        
        .note-cell {
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .note-cell:hover {
            background-color: rgba(0, 123, 255, 0.05);
        }
        
        .note-content-wrapper {
            max-height: 4.2em; /* Yaklaşık 3 satır görünecek şekilde kısıtla */
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            position: relative;
            word-break: break-word;
            line-height: 1.4;
        }
        
        .note-cell.expanded .note-content-wrapper {
            max-height: 1000px; /* İçerik ne kadar uzunsa açılsın */
        }
        
        /* Genişleyebilir olduğunu belli eden ikon/gölge */
        .note-content-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1.5em;
            background: linear-gradient(transparent, white);
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .note-cell.expanded .note-content-wrapper::after {
            opacity: 0;
        }
        
        tr:nth-child(even) .note-content-wrapper::after {
            background: linear-gradient(transparent, #f2f2f2);
        }
        
        .tamamlandi .note-content-wrapper::after {
            background: linear-gradient(transparent, #f0f0f0);
        }

        .expand-icon {
            display: block;
            text-align: center;
            font-size: 10px;
            color: #007bff;
            margin-top: 2px;
            opacity: 0.7;
        }
        
        .note-cell.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .note-list {
            margin: 0;
            padding-left: 20px;
            list-style-type: decimal;
        }
        .note-list li {
            margin-bottom: 4px;
        }

        .note-row:hover {
            background-color: #e9ecef;
            cursor: pointer;
        }
        .note-edit-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
        }
        .note-edit-container textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        .note-edit-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
        }
        .note-edit-buttons button {
            padding: 5px 10px;
            font-size: 12px;
        }
        .table-wrapper[data-group="Personel Raporu"] h2, .table-wrapper[data-group="İlçe Raporu"] h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        .table-wrapper[data-group="Personel Raporu"] h2:first-of-type, .table-wrapper[data-group="İlçe Raporu"] h2:first-of-type {
            margin-top: 0;
        }
        #guncellemeDetailTable th[data-header="İLÇE"],
        #guncellemeDetailTable td.col-ilce-detail {
            display: none;
        }
        /* Özet Kart Stilleri */
        #summary-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .summary-card {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            height: 40px; /* Başlangıç yüksekliği */
            overflow: hidden;
            position: relative; /* Buton konumlandırma için */
        }
        .summary-card.expanded {
            height: auto;
            min-height: 150px; /* İçeriğin sığması için minimum yükseklik */
        }
        .summary-card h3 {
            margin: 0;
            color: white;
            font-size: 18px;
        }
        .summary-card .card-content {
             display: none; /* Başlangıçta gizli */
        }
        .summary-card.expanded .card-content {
             display: block; /* Genişletilince görünür */
             margin-top: 10px;
             text-align: left; /* İçeriği sola hizala */
        }
        .summary-card .total-count {
            font-size: 24px;
            font-weight: bold;
            color: #343a40;
            margin-bottom: 5px; /* Boşluğu azalt */
        }
         .summary-card .project-date-range { /* Genel tarih aralığı */
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 10px;
            font-weight: bold;
            display: block; /* Yeni satıra geçmesi için */
        }
        .summary-card .status-breakdown {
            font-size: 12px;
            color: #495057;
            text-align: left;
            max-height: 150px; /* Yüksekliği biraz artır */
            overflow-y: auto;
            padding-right: 10px; /* for scrollbar */
        }
        .summary-card .status-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Üstten hizala */
            padding: 3px 0; /* Dikey boşluk */
            border-bottom: 1px dashed #eee; /* Ayırıcı çizgi */
            flex-wrap: wrap; /* Küçük ekranlar için */
        }
         .status-item span {
            flex-grow: 1; /* Durum adının alanı kaplamasını sağla */
            margin-right: 5px; /* Sayı ile arasında boşluk */
            font-weight: bold; /* Durum adı kalın */
        }
         .status-item strong {
            flex-shrink: 0; /* Sayının küçülmesini engelle */
            background-color: rgba(0,0,0,0.05);
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: auto; /* Sayıyı sağa yasla */
        }
         .status-item ul { /* İç içe liste için stil */
             list-style-type: none;
             padding-left: 0; /* Girintiyi kaldır */
             margin: 2px 0 0 0;
             font-size: 10px;
             color: #6c757d;
             width: 100%; /* Tam genişlik kapla */
         }
         .status-item ul li {
             padding: 1px 0;
             display: flex; /* İlçe-birim ve tarihi yan yana getir */
             justify-content: space-between; /* Aralarına boşluk koy */
         }
         .status-item ul li .item-dates { /* Tarih aralığı stili */
             margin-left: 5px; /* İş adı ile arasında boşluk */
             white-space: nowrap; /* Tarihlerin alt satıra düşmesini engelle */
         }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-item:hover {
            background-color: rgba(0,0,0,0.05);
            border-radius: 3px;
        }
        .card-2b { background-color: #007bff; }
        .card-guncelleme { background-color: #28a745; }
        .card-mudurluk { background-color: #fd7e14; }
        .card-guncelleme2026 { background-color: #6f42c1; } /* Mor renk - Yeni Kart */
        
        .card-2b.expanded { background-color: #e7f1ff; border-left: 5px solid #007bff; }
        .card-guncelleme.expanded { background-color: #d4edda; border-left: 5px solid #28a745; }
        .card-mudurluk.expanded { background-color: #ffe8d6; border-left: 5px solid #fd7e14; }
        .card-guncelleme2026.expanded { background-color: #e2d9f3; border-left: 5px solid #6f42c1; }
        
        .card-2b.expanded h3, .card-guncelleme.expanded h3, .card-mudurluk.expanded h3, .card-guncelleme2026.expanded h3 { color: #343a40; }
        

        /* Uyarı Stilleri */
         #alerts-container {
             margin-top: -15px; /* Kartların altına daha yakın */
             margin-bottom: 20px;
             padding: 10px;
             border-radius: 5px;
             /* Başlangıçta gizli, uyarı varsa JS ile gösterilecek */
             display: none; 
         }
         .alert-item {
             padding: 8px 12px;
             border-radius: 4px;
             margin-bottom: 5px;
             font-size: 13px;
             font-weight: bold;
         }
         .alert-item.commission-alert { /* Sarı */
             background-color: #fff3cd; 
             color: #856404;
             border: 1px solid #ffeeba;
             animation: blinkWarning 1.5s infinite;
         }
         .alert-item.missing-date-alert { /* Kırmızı */
             background-color: #f8d7da;
             color: #721c24;
             border: 1px solid #f5c6cb;
             animation: blinkDanger 1.5s infinite;
         }
         .alert-item.info-alert { /* Mavi */
            background-color: #d1ecf1; 
            color: #0c5460; 
            border: 1px solid #bee5eb;
         }
         /* Yeni eklenen Askı Bitti Stili */
         .alert-item.askibitti-alert {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
         }

         .alert-item strong {
             margin-right: 5px;
         }
          .alert-item span a, .alert-item span .alert-job-link { /* Tıklanabilir link stili */
             color: inherit !important; /* Rengi koru */
             text-decoration: underline;
             cursor: pointer;
             margin-right: 5px; /* Linkler arasına boşluk */
         }
          .alert-item span a:hover, .alert-item span .alert-job-link:hover {
             font-weight: bold;
         }

         @keyframes blinkWarning {
             0%, 100% { background-color: #fff3cd; }
             50% { background-color: #ffeeba; }
         }
          @keyframes blinkDanger { /* Kırmızı yanıp sönme */
             0%, 100% { background-color: #f8d7da; }
             50% { background-color: #f5c6cb; }
         }

         /* Notlar Sayfası Filtre */
         .notes-filter-container {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
         }
         .notes-filter-container select {
             width: 300px;
         }
         
         /* Genel Rapor Sekmesi Stilleri */
         .general-report-controls {
             display: flex;
             gap: 10px;
             margin-bottom: 15px;
             flex-wrap: wrap;
         }
         #general-report-output {
             width: 100%;
             height: 500px;
             padding: 15px;
             font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
             font-size: 14px;
             border: 1px solid #ccc;
             border-radius: 5px;
             resize: vertical;
             line-height: 1.6;
             box-sizing: border-box;
             background-color: #fcfcfc;
         }
    </style>
</head>
<body>

<canvas id="dynamic-bg"></canvas>

<div id="main-app-container">
    <div class="container">

function initAnimatedBackground() {
    const bgCanvas = document.getElementById('dynamic-bg');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: bgCanvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    const gradientTexture = new THREE.CanvasTexture(generateGradient());
    scene.background = gradientTexture;

    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCnt = 3000;
    const posArray = new Float32Array(particlesCnt * 3);
    for(let i = 0; i < particlesCnt * 3; i++) { 
        posArray[i] = (Math.random() - 0.5) * 15; 
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    
    const particlesMaterial = new THREE.PointsMaterial({ size: 0.015, color: 0xffffff });
    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);
    
    camera.position.z = 5;
    
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (event) => { 
        mouseX = event.clientX; 
        mouseY = event.clientY; 
    });
    
    const clock = new THREE.Clock();
    
    const animate = () => {
        const elapsedTime = clock.getElapsedTime();
        particlesMesh.rotation.y = -0.05 * elapsedTime;
        if(mouseX > 0) {
            particlesMesh.rotation.x = -mouseY * (elapsedTime * 0.00003);
            particlesMesh.rotation.y += -mouseX * (elapsedTime * 0.00003);
        }
        renderer.render(scene, camera);
        window.requestAnimationFrame(animate);
    };
    animate();

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    function generateGradient() {
        const canvas = document.createElement('canvas');
        canvas.width = 1;
        canvas.height = 512;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 512);
        gradient.addColorStop(0, '#87CEEB'); // Sky Blue
        gradient.addColorStop(1, '#B0E0E6'); // Powder Blue
        context.fillStyle = gradient;
        context.fillRect(0, 0, 1, 512);
        return canvas;
    }
}


function handleSummaryCardClick(event) {

        showTab(groupName);

            document.getElementById('durumFiltresi').value = status;

    else {

function handleTableChange(event) {
    const target = event.target;
    if (target.tagName === 'INPUT' || target.tagName === 'SELECT') {
        const row = target.closest('tr');
        if (!row || !row.dataset.rowKey) return;

        const rowKey = row.dataset.rowKey;
        const header = target.dataset.header;
        
        let value;
        if (target.type === 'checkbox') {
            value = target.checked ? 'EVET' : 'HAYIR';
        } else if ($(target).hasClass('personel-select')) {
            value = $(target).val() || []; // Get array from select2
        } else {
            value = target.value;
        }

        const table = row.closest('table');

        if (table.id === 'guncellemeDetailTable') {
            const dataRow = guncellemeData.find(r => r._ui_id === rowKey);
            if (dataRow) dataRow[header] = value;
        } else {
            const dataRow = isTakipData.find(r => r._ui_id === rowKey);
            if (dataRow) {
                if (header === 'GÖREVLİ PERSONELLER') {
                    const personnelWithTitles = value;
                    const personnelWithoutTitles = personnelWithTitles.map(p => p.replace(/ \(.+\)$/, '').trim());
                    dataRow[header] = personnelWithoutTitles.join(', ');
                } else {
                    dataRow[header] = value;
                }
            }
        }

        // Sync UI - This part handles visual sync. 
        // With unique IDs, syncing by key only updates the exact row.
        // If there are duplicates, checking one won't check the other, which is safer.
        document.querySelectorAll(`tr[data-row-key="${rowKey}"]`).forEach(syncRow => {
            if (syncRow !== row) {
                const syncTarget = syncRow.querySelector(`[data-header="${header}"]`);
                if (syncTarget) {
                    if (syncTarget.type === 'checkbox') {
                        syncTarget.checked = (value === 'EVET');
                    } else if ($(syncTarget).hasClass('personel-select')) {
                         $(syncTarget).val(value).trigger('change.select2');
                     }
                    else {
                        syncTarget.value = value;
                    }
                }
            }
        });
        
        if (target.type === 'checkbox' && header === 'Tamamlandı') {
             document.querySelectorAll(`tr[data-row-key="${rowKey}"]`).forEach(syncRow => {
                syncRow.classList.toggle('tamamlandi', target.checked);
             });

            // "Notlar" ve "Güncelleme Detay" sekmelerindeki satırları da senkronize et (if IDs match)
            const notRow = document.querySelector(`#notlar-table tr[data-row-key="${rowKey}"]`);
            if (notRow) {
                notRow.classList.toggle('tamamlandi', target.checked);

            // Komisyon tablosunu da senkronize et
            const komisyonRow = document.querySelector(`#komisyonTable tr[data-row-key="${rowKey}"]`);
            if (komisyonRow) {
                komisyonRow.classList.toggle('tamamlandi', target.checked);
            }
        }

        markAsDirty();
    }

function displayWarnings() {

    const warnings = {
        // eksikIlanTarihi: [], // Kullanıcının isteği üzerine kaldırıldı
        komisyonGecikmesi: [],
        kesinAskiBitti: [] // Yeni eklendi

                    ilanTarihi.setHours(0,0,0,0);

                    const timeDiff = today.getTime() - ilanTarihi.getTime();
                    const dayDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));

                    if (dayDiff > 15) {
                        warnings.komisyonGecikmesi.push({ilce: detailRow['İLÇE'], birim: detailRow['BİRİM']});

                } else {
                     console.warn("Geçersiz tarih formatı algılandı (Komisyon Kontrolü):", ilanTarihiStr);

                        // Durumu 'DEVİR YAPILDI' değilse uyarıya ekle
                        if (durum !== 'DEVİR YAPILDI') {
                            warnings.kesinAskiBitti.push({ilce: detailRow['İLÇE'], birim: detailRow['BİRİM']});
                        }
                    }
                }
            } catch(e) { /* ignore */ }

    });

function readSheetAsList(workbook, sheetName, header=true) {
    const sheet = workbook.Sheets[sheetName];
    if (!sheet) return [];
    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const data = header ? json.slice(1) : json;
    return data.map(row => row[0]).filter(Boolean);
}

function parseLists(workbook, sheetName) {
    const sheet = workbook.Sheets[sheetName];
    if (!sheet) return;
    const json = XLSX.utils.sheet_to_json(sheet);
    ucusKiyDurumList = json.map(row => row['UÇUŞ KIYMETLENDİRME DURUM']).filter(Boolean);
    komisyonDurumList = json.map(row => row['KOMİSYON DURUM']).filter(Boolean);
    degerlendirmeDurumList = json.map(row => row['DEĞERLENDİRME DURUM']).filter(Boolean);
    
    const durumListesiFromSheet = json.map(row => row['DURUMU']).filter(Boolean);
    if (durumListesiFromSheet.length > 0) {
        durumlar = durumListesiFromSheet;
    } else {
        console.warn('Excel "Liste" sayfasında "DURUMU" sütunu bulunamadı veya boş. Varsayılan durum listesi kullanılıyor.');
        durumlar = ['YER TESLİMİ YAPILDI', 'HERHANGİ BİRŞEY YAPILMADI', 'TAPU KAYIT KARŞILAŞTIRMA', 'BİLİRKİŞİ YEMİN/ADA-MEVKİ İLAN', 'ARAZİ DEVAM EDİYOR', 'DEĞERLENDİRMEDE', 'ASKI İLANINA HAZIRLANIYOR', 'BİLGİLENDİRME İLANINDA', 'KOMİSYON AŞAMASINDA', 'KESİN ASKIDA', 'DEVİR YAPILDI', 'TESCİL AŞAMASINDA', 'İHALEDEN/PROGRAMDAN ÇIKARILDI', 'KESİN ASKIDAN İNDİ. BEKLEMEDE', 'DEPREM NEDENİYLE ASKI YENİLENECEK', 'VERİLER ELEKTRONİK ORTAMDA HAZIR', 'ORMAN ASKISI', 'TESCİLİ BİTTİ'];
    }
}

async function fetchFromGitHub() {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('alerts-container').style.display = 'none'; // Uyarıları gizle
    document.getElementById('uyari').style.display = 'none'; // Durum mesajını gizle

    try {
        const response = await fetch(API_URL, { 
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` },
            cache: 'no-cache' 
        });
        if (!response.ok) throw new Error(`GitHub API Hatası: ${response.status} ${response.statusText}`);
        
        const data = await response.json();
        currentFileSHA = data.sha;
        
        const binary_string = window.atob(data.content);
        const bytes = new Uint8Array(binary_string.length);
        for (let i = 0; i < binary_string.length; i++) { bytes[i] = binary_string.charCodeAt(i); }
        const workbook = XLSX.read(bytes, { type: 'array' });

        const personelSheet = workbook.Sheets['Personel'];
        if (personelSheet) {
            const personel_json = XLSX.utils.sheet_to_json(personelSheet, { header: 1 });
            fullPersonelListesi = personel_json.slice(1)
                .filter(row => row && row[0] && row[1])
                .map(row => `${row[0]} (${row[1]})`);

            const unvanFiltrele = (unvanListesi) => {
                return fullPersonelListesi.filter(personelString => {
                    const match = personelString.match(/\(([^)]+)\)$/);
                    if (!match || !match[1]) return false;
                    const unvan = match[1].toLocaleUpperCase('tr-TR');
                    return unvanListesi.some(u => unvan.includes(u));
                });
            };

            personelListesi = unvanFiltrele(['MÜHENDİS', 'TEKNİKER', 'TEKNİSYEN']);
            muhendisListesi = unvanFiltrele(['MÜHENDİS']);
            teknikerListesi = unvanFiltrele(['TEKNİKER', 'TEKNİSYEN']);

        } else {
            personelListesi = [];
            fullPersonelListesi = [];
            muhendisListesi = [];
            teknikerListesi = [];
        }


        ilceListesi = readSheetAsList(workbook, 'İlçe');
        uygulamaListesi = readSheetAsList(workbook, 'Uygulama');
        parseLists(workbook, 'Liste');

        // İş Takip Listesi Okuma ve Normalizasyon + ID ATAMA
        let rawIsTakip = XLSX.utils.sheet_to_json(workbook.Sheets['İş Takip Listesi'] || {});
        isTakipData = rawIsTakip.map((row, index) => {
            row._ui_id = 'main_' + index; // Benzersiz ID Ata
            if (row['MAHALLE'] && !row['BİRİM']) row['BİRİM'] = row['MAHALLE'];
            return row;
        }).filter(row => row['İLÇE'] && row['BİRİM']);

        // GÜNCELLEME ve GÜNCELLEME(2026) Sayfalarını Okuma
        const guncellemeOld = XLSX.utils.sheet_to_json(workbook.Sheets['Güncelleme'] || {});
        const guncelleme2026 = XLSX.utils.sheet_to_json(workbook.Sheets['Güncelleme(2026)'] || {});
        
        // Detay verilerini birleştir ve boş satırları temizle + ID ATAMA
        guncellemeData = [...guncellemeOld, ...guncelleme2026]
              .filter(row => row['İLÇE'] && row['BİRİM'])
              .map((row, index) => {
                  row._ui_id = 'detail_' + index; // Benzersiz ID Ata
                  return row;
              });

        // KOMİSYON SAYFASI OKUMA
        const rawKomisyon = workbook.Sheets['Komisyon'] ? XLSX.utils.sheet_to_json(workbook.Sheets['Komisyon']) : [];
        komisyonData = isTakipData
            .filter(r => r['UYGULAMA'] === 'GÜNCELLEME' || r['UYGULAMA'] === 'GÜNCELLEME(2026)')
            .map(job => {
                const existing = rawKomisyon.find(k => k['İLÇE'] === job['İLÇE'] && k['BİRİM'] === job['BİRİM']);
                return {
                    _ui_id: job._ui_id,
                    'İLÇE': job['İLÇE'],
                    'BİRİM': job['BİRİM'],
                    'KOMİSYON GÖREVLİLERİ': existing ? existing['KOMİSYON GÖREVLİLERİ'] : ''
                };
            });
        
        $('#personel-modal-select').select2({
            placeholder: "Personel Seçin",
            dropdownParent: $('#personel-modal')
        });
        
        createSummaryCards();
        renderAllTables(isTakipData, guncellemeData);
        displayWarnings(); // Uyarıları göster
        document.getElementById('uyari').style.display = 'block'; // Başarı mesajını göster

        document.getElementById('loader').style.display = 'none';
        document.getElementById('githubKaydetBtn').disabled = false;
        markAsClean();
        durumFiltresiDoldur();
        
        // VARSAYILAN OLARAK İLK KATEGORİYİ AÇ (TÜMÜ YERİNE)
        const firstTabBtn = document.querySelector('.tab-btn');
        if (firstTabBtn) {
             const tabName = firstTabBtn.dataset.uygulama;
             showTab(tabName);
        } else {
             // Fallback
             showTab('GÜNCELLEME'); 
        }

    } catch (error) {
        console.error("GitHub'dan veri çekme hatası:", error);
        document.getElementById('loader').style.display = 'none';
        const uyariContainer = document.getElementById('alerts-container');
        uyariContainer.innerHTML = `<div class="alert-item missing-date-alert"><strong>Hata:</strong> Veriler çekilemedi! ${error.message}</div>`;
        uyariContainer.style.display = 'block';
    }
}

    textArea.id = 'general-report-output';
    textArea.placeholder = 'Rapor oluşturmak için yukarıdaki butonlardan birine tıklayın...';
    
    container.appendChild(controls);
    container.appendChild(textArea);
    
    return container;
}

function generateBulkReport(category) {
    let reportData = [];
    
    // Veriyi filtrele
    if (category === 'Müdürlük') {
        reportData = isTakipData.filter(r => r['İHALELİ/MÜDÜRLÜK'] === 'Müdürlük');
    } else {
        reportData = isTakipData.filter(r => r['UYGULAMA'] === category && r['İHALELİ/MÜDÜRLÜK'] !== 'Müdürlük');
    }

    if (reportData.length === 0) {
        showToast('Bu kategoride raporlanacak iş bulunamadı.');
        return;
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    // Başlık
    let reportText = "";

    if (category === 'GÜNCELLEME' || category === 'GÜNCELLEME(2026)') {
        // GÜNCELLEME İÇİN ÖZEL BİLGİ NOTU FORMATI
        
        let toplamBirim = reportData.length;
        let toplamParsel = 0;
        let toplamIdoParsel = 0;
        
        let bilgilendirmeIlaniList = [];
        let komisyonuYapilanList = [];
        let kesinAskisiYapilanList = [];
        let degerlendirmeDevamEdenList = [];
        let firmayaTeslimEdilenList = [];
        let digerList = []; // Kalanlar

        // İsim formatlama yardımcı fonksiyonu
        const formatBirim = (ilce, birim) => `${ilce}-${birim}`;

        reportData.forEach(job => {
            const ilce = job['İLÇE'] || '';
            const birim = job['BİRİM'] || '';
            const birimAdi = formatBirim(ilce, birim);
            
            toplamParsel += Number(job['PARSEL SAYISI']) || 0;
            
            // Detay verisi
            const detailRow = guncellemeData.find(d => d['İLÇE'] === ilce && d['BİRİM'] === birim) || {};
            toplamIdoParsel += Number(detailRow['İDÖ PARSEL SAYISI']) || 0;

            let statusCaptured = false;

            // Bilgilendirme İlanı Yapılanlar
            if (detailRow['BİLGİLENDİRME İLANI TARİHİ']) {
                bilgilendirmeIlaniList.push(birimAdi);
                
                // Bu grup içinden Komisyonu Yapılanlar
                if (detailRow['KOMİSYON DURUM'] === 'Yapıldı') {
                    komisyonuYapilanList.push(birimAdi);
                }
            }

            // Kesin Askı İlanı Yapılanlar (Genel)
            if (detailRow['KESİN ASKI TARİHİ']) {
                kesinAskisiYapilanList.push(birimAdi);
                statusCaptured = true;
            }

            // Değerlendirmesi Devam Edenler (Ana Durum veya Detay Durum)
            // Detaydaki DEĞERLENDİRME DURUM 'Yapıldı' değilse ve boş değilse veya 'Devam Ediyor' ise
            const degDurum = detailRow['DEĞERLENDİRME DURUM'];
            const anaDurum = job['DURUMU'];
            
            if (!statusCaptured && (anaDurum === 'DEĞERLENDİRMEDE' || (degDurum && degDurum !== 'Yapıldı' && degDurum !== 'Yapılmadı'))) {
                degerlendirmeDevamEdenList.push(birimAdi);
                statusCaptured = true;
            }

            // Firmaya Teslim Edilenler
            if (!statusCaptured && anaDurum === 'FİRMAYA TESLİM EDİLDİ') {
                firmayaTeslimEdilenList.push(birimAdi);
                statusCaptured = true;
            }
            
            if (!statusCaptured && !kesinAskisiYapilanList.includes(birimAdi)) {
                 digerList.push(`${birimAdi} (${anaDurum || 'Belirsiz'})`);
            }
        });

        reportText += `**BİLGİ NOTU**

**KONU:** MERSİN İLİ KADASTRO GÜNCELLEME ÇALIŞMALARI (${category})

Mersin ili genelinde yürütülen güncelleme çalışmaları kapsamında toplam **${toplamBirim}** adet birimde, **${toplamIdoParsel}** adet İDÖ parseli ve **${toplamParsel}** adet parselde çalışmalar sürdürülmektedir.

**SÜREÇ ÖZETİ:**

* **Bilgilendirme İlanı:** Toplam **${bilgilendirmeIlaniList.length}** birimin bilgilendirme ilanı yapılmıştır.
    * Bu birimlerden **${komisyonuYapilanList.length}** tanesinin (${komisyonuYapilanList.join(', ')}) komisyon çalışmaları tamamlanmıştır.

* **Kesin Askı İlanı:** Toplam **${kesinAskisiYapilanList.length}** birimin (${kesinAskisiYapilanList.join(', ')}) kesin askı ilanı yapılmıştır.

* **Değerlendirme Aşaması:** **${degerlendirmeDevamEdenList.length}** birimde (${degerlendirmeDevamEdenList.join(', ')}) değerlendirme çalışmaları devam etmektedir.

* **Firmaya Teslim:** **${firmayaTeslimEdilenList.length}** birim (${firmayaTeslimEdilenList.join(', ')}) firmaya teslim edilmiş olup süreç takibindedir.

* **Diğer Birimler:** Kalan birimlerin aşama durumları şöyledir:
    ${digerList.join(', ')}

----------------------------------------------------------------------------------
**DETAYLI İŞ LİSTESİ**
`;

    } else {
        // Diğer Kategoriler İçin Standart Başlık
        reportText += `**YÖNETİCİ ÖZETİ: ${category.toUpperCase()} İŞLERİ DETAY RAPORU**
Tarih: ${today.toLocaleDateString('tr-TR')}

**GENEL GÖRÜNÜM**
${category} kapsamında toplam **${reportData.length}** adet iş listelenmiştir.

----------------------------------------------------------------------------------
`;
    }

    // Her bir iş için detaylı döküm (Tüm kategoriler için ortak)
    reportData.forEach((job, index) => {
        const ilce = job['İLÇE'] || '-';
        const birim = job['BİRİM'] || '-';
        const durum = job['DURUMU'] || 'Belirtilmemiş';
        const parsel = job['PARSEL SAYISI'] || '0';
        const alan = job['ALAN(Ha)'] || '0';
        
        // Detay satırını bul (Güncelleme sayfası verileri)
        const detailRow = guncellemeData.find(d => d['İLÇE'] === job['İLÇE'] && d['BİRİM'] === job['BİRİM']) || {};
        
        // Tarih formatlayıcı
        const fd = (val) => val ? formatDate(excelDateToJSDate(val)) : '-';

        reportText += `\n**${index + 1}. ${ilce} - ${birim}**
   - Durum: ${durum}
   - Parsel: ${parsel}, Alan: ${alan} Ha
   - İşe Başlama: ${fd(job['İŞE BAŞLAMA/YER TESLİMİ'])} | Bitiş: ${fd(job['İHALE BİTİŞ TARİHİ'])}
`;

        if (category === 'GÜNCELLEME' || category === 'GÜNCELLEME(2026)') {
            reportText += `   - Arazi Yersel Ölçüm: ${fd(detailRow['ARAZİ YERSEL ÖLÇÜM TARİHİ(YAPILAN)'])}
   - Uçuş Tarihi: ${fd(detailRow['UÇUŞ TARİHİ(YAPILAN)'])}
   - Uçuş Kıymetlendirme: ${detailRow['UÇUŞ KIYMETLENDİRME DURUM'] || '-'}
   - Değerlendirme: ${detailRow['DEĞERLENDİRME DURUM'] || '-'}
   - Orman Askı Tarihi: ${fd(detailRow['ORMAN ASKI TARİHİ'])}
   - Bilgilendirme İlanı: ${fd(detailRow['BİLGİLENDİRME İLANI TARİHİ'])}
   - Komisyon Durumu: ${detailRow['KOMİSYON DURUM'] || '-'}
   - Kesin Askı Tarihi: ${fd(detailRow['KESİN ASKI TARİHİ'])}
`;
        }
        
        reportText += `----------------------------------------------------------------------------------`;
    });

    reportText += `\n\nBilgilerinize arz ederim.`;

    document.getElementById('general-report-output').value = reportText;
}


function showTab(uygulamaAdi) {
    document.getElementById('durumFiltresi').value = ''; // Filtreyi sıfırla

    document.querySelectorAll('.table-wrapper').forEach(w => w.classList.remove('active'));
    document.querySelector(`.table-wrapper[data-group="${uygulamaAdi}"]`).classList.add('active');
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.uygulama === uygulamaAdi || (uygulamaAdi === 'Tümü' && btn.textContent === 'Tümü')) {
            btn.classList.add('active');
        }
    });

    document.querySelectorAll('.summary-card').forEach(card => {
        if (card.dataset.uygulama !== uygulamaAdi) {
            card.classList.remove('expanded');
        }
    });

    if (uygulamaAdi === 'Tümü') {
         document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('expanded'));
    } 

    const kayitSayaci = document.getElementById('kayitSayaci');
    if (uygulamaAdi === 'Personel Raporu' || uygulamaAdi === 'Notlar' || uygulamaAdi === 'İlçe Raporu' || uygulamaAdi === 'Genel Raporlar') {
        kayitSayaci.style.display = 'none';
    } else {
        kayitSayaci.style.display = 'block';
    }

    filtrele(); // Filtreyi uygula (artık sıfırlanmış olmalı)
    setTimeout(setupTopScrollbar, 50);
    setTimeout(applyStickyColumns, 50);
}

function saveToGitHub() {
    const btn = document.getElementById('githubKaydetBtn');
    btn.disabled = true;
    btn.innerHTML = 'Kaydediliyor...';
    const uyariContainer = document.getElementById('alerts-container'); // 'alerts-container'ı kullan
    uyariContainer.innerHTML = `<div class="alert-item info-alert"><strong>Durum:</strong> Değişiklikler gönderiliyor...</div>`;
    uyariContainer.style.display = 'block';

    (async function() {
        try {
            const mainData = getTableDataFromUI();
            const allDetailData = getGuncellemeDetailDataFromUI();

            const wb = XLSX.utils.book_new();
            
            const mainSheetData = mainData.map(row => {
                const newRow = {...row};
                delete newRow.PERSONEL; // Personel butonu için geçici sütunu kaldır
                return newRow;
            });

            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mainSheetData, {header: EXCEL_HEADERS_MAIN.filter(h => h !== 'PERSONEL'), cellDates:true}), 'İş Takip Listesi');
            
            // Tüm detay verilerini "Güncelleme" sayfasına yaz
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allDetailData, {header: EXCEL_HEADERS_DETAIL, cellDates:true}), 'Güncelleme');

            const personelData = [['ad', 'unvan'], ...fullPersonelListesi.map(p => { 
                const m = p.match(/(.*) \((.*)\)/); 
                return m ? [m[1].trim(), m[2].trim()] : [p, '']; 
            })];
            
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(personelData), 'Personel');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['İlçe'], ...ilceListesi.map(i => [i])]), 'İlçe');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['Uygulama'], ...uygulamaListesi.map(u => [u])]), 'Uygulama');
            
            const listHeaders = ['UÇUŞ KIYMETLENDİRME DURUM', 'KOMİSYON DURUM', 'DEĞERLENDİRME DURUM', 'DURUMU'];
            const listSheetData = [listHeaders];
            const maxRows = Math.max(ucusKiyDurumList.length, komisyonDurumList.length, degerlendirmeDurumList.length, durumlar.length);
            for(let i = 0; i < maxRows; i++) {
                listSheetData.push([
                    ucusKiyDurumList[i] || '', 
                    komisyonDurumList[i] || '', 
                    degerlendirmeDurumList[i] || '',
                    durumlar[i] || ''
                ]);
            }
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(listSheetData), 'Liste');

            // KOMİSYON VERİSİNİ YAZMA
            const komisyonSheetData = komisyonData.map(row => ({
                'İLÇE': row['İLÇE'],
                'BİRİM': row['BİRİM'],
                'KOMİSYON GÖREVLİLERİ': row['KOMİSYON GÖREVLİLERİ']
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(komisyonSheetData, {header: ['İLÇE', 'BİRİM', 'KOMİSYON GÖREVLİLERİ']}), 'Komisyon');

            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'binary' });
            const base64Content = btoa(wbout);

            const putResponse = await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `İş Takip Güncellemesi - ${new Date().toLocaleString()}`, content: base64Content, sha: currentFileSHA })
            });

            if (!putResponse.ok) throw new Error(`GitHub API Hatası: ${putResponse.status} - ${putResponse.statusText}`);
            
            const responseData = await putResponse.json();
            currentFileSHA = responseData.content.sha;
            document.getElementById('uyari').style.display = 'block'; // Başarı mesajını göster
            markAsClean();
            
            const activeTab = document.querySelector('.tab-btn.active').dataset.uygulama || 'GÜNCELLEME';
            await fetchFromGitHub();
            showTab(activeTab);

        } catch (error) {
            console.error('GitHub\'a kaydetme hatası:', error);
            uyariContainer.innerHTML = `<div class="alert-item missing-date-alert"><strong>Hata:</strong> Kaydetme başarısız! ${error.message}</div>`;
            uyariContainer.style.display = 'block';

            markAsDirty();
        } finally {
            btn.disabled = false;
        }
    })();
}

function getTableDataFromUI() {
    const data = [];
    const uniqueKeys = new Set();
    
    document.querySelectorAll('.table-wrapper:not([data-group="Güncelleme Detay"]):not([data-group="Personel Raporu"]):not([data-group="Notlar"]):not([data-group="İlçe Raporu"]):not([data-group="Genel Raporlar"]):not([data-group="Komisyon"]) tbody tr:not(.group-header-row)').forEach(row => {
        const key = row.dataset.rowKey;
        if (key && !uniqueKeys.has(key)) {
            const cells = row.querySelectorAll('td');
            // DÜZELTİLEN KISIM: ID ile arama yapıyoruz
            const originalDataRow = isTakipData.find(r => r._ui_id === key);
            
            // Indexler robot butonu kalktığı için 1 azaldı.
            // 0: Check, 1: İlçe, 2: Birim, 3: Uygulama, 4: Not Btn, 5: Personel Btn, 6: Hidden Personel Select
            const personnelWithTitles = $(cells[6]).find('.personel-select').val() || [];
            const personnelWithoutTitles = personnelWithTitles.map(p => p.replace(/ \(.+\)$/, '').trim());

            data.push({
                'Tamamlandı': cells[0].querySelector('input[type="checkbox"]').checked ? 'EVET' : 'HAYIR',
                'İLÇE': cells[1].querySelector('select').value,
                'BİRİM': cells[2].querySelector('input').value,
                'UYGULAMA': cells[3].querySelector('select').value,
                'PERSONEL': '', // This is just a placeholder for the button column
                'GÖREVLİ PERSONELLER': personnelWithoutTitles.join(', '),
                'PARSEL SAYISI': cells[7].querySelector('input').value,
                'BLOK SAYISI': cells[8].querySelector('input').value,
                'ALAN(Ha)': cells[9].querySelector('input').value,
                'İHALELİ/MÜDÜRLÜK': cells[1].querySelector('input[type="hidden"]').value,
                'İŞE BAŞLAMA/YER TESLİMİ': cells[10].querySelector('input').value,
                'İHALE BİTİŞ TARİHİ': cells[11].querySelector('input').value,
                'DURUMU': cells[12].querySelector('select').value,
                'NOTLAR': originalDataRow ? originalDataRow['NOTLAR'] : ''
            });
            uniqueKeys.add(key);
        }
    });
    return data;
}

function getGuncellemeDetailDataFromUI() {
    const data = [];
    document.querySelectorAll('#guncellemeDetailTable tbody tr').forEach(row => {
        const newRow = {};
        const cells = row.querySelectorAll('td'); // Get all *visible* cells in the row
        
        // Get original data to include hidden columns
        const key = row.dataset.rowKey;
        const originalDetailRow = guncellemeData.find(r => `${r['İLÇE']}|${r['BİRİM']}` === key) || {};
        
        let cellIndex = 0; // Index for visible cells
        EXCEL_HEADERS_DETAIL.forEach(header => {
             if (GIZLI_DETAY_SUTUNLAR.includes(header)) {
                 // Get value from original data for hidden columns
                 newRow[header] = originalDetailRow[header] || '';
             } else {
                 // Get value from visible cells
                 const cell = cells[cellIndex]; // Get the next visible cell
                 if (cell) { // Check if cell exists
                     const inputEl = cell.querySelector('input');
                     const selectEl = cell.querySelector('select');
                     
                     if (selectEl) {
                         newRow[header] = selectEl.value;
                     } else if (inputEl) {
                         newRow[header] = inputEl.value;
                     } else {
                         // Fallback if no input/select is found (e.g., plain text, though unlikely now)
                         newRow[header] = cell.textContent; 
                     }
                 }
                 cellIndex++; // Only increment index for visible cells
             }
        });
        
        data.push(newRow);
    });
    return data;
}

function excelDateToJSDate(serial) {
    if (!serial) return serial;

    // 1. Check if it's already a YYYY-MM-DD string
    if (typeof serial === 'string' && serial.match(/^\d{4}-\d{2}-\d{2}$/)) {
        const parts = serial.split('-');
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1; // JS month is 0-indexed
        const day = parseInt(parts[2], 10);
        if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
            return new Date(year, month, day);
        }
    }

    // 2. Check if it's a DD.MM.YYYY string
    if (typeof serial === 'string') {
        const parts = serial.match(/(\d{1,2})[./-](\d{1,2})[./-](\d{4})/);
        if (parts) {
            const day = parseInt(parts[1], 10);
            const month = parseInt(parts[2], 10) - 1; // JS ayları 0'dan başlar
            const year = parseInt(parts[3], 10);
            if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                return new Date(year, month, day);
            }
        }
    }

    // 3. Check if it's an Excel serial number (numeric)
    if (!isNaN(serial) && Number(serial) > 0 && typeof serial !== 'string') { // Added check for not string
        const excelEpoch = new Date(1899, 11, 30, 12, 0, 0);
        excelEpoch.setDate(excelEpoch.getDate() + Number(serial));
        return excelEpoch;
    }
    
    // 4. If it's some other string, try parsing directly (less reliable)
    if (typeof serial === 'string') {
        const d = new Date(serial);
        if (!isNaN(d.getTime())) {
            return d;
        }
    }

    // If all else fails, return the original (likely invalid) value
    return serial;
}


function formatDate(date) {
    if (!date) return '';
    try {
        const d = new Date(date);
        // Geçerli bir tarih mi kontrol et
        if (isNaN(d.getTime())) {
             // GG.AA.YYYY formatını dene
             if (typeof date === 'string') {
                const parts = date.match(/(\d{1,2})[./-](\d{1,2})[./-](\d{4})/);
                if (parts) {
                    const year = parts[3];
                    const month = parts[2].padStart(2, '0');
                    const day = parts[1].padStart(2, '0');
                    return `${year}-${month}-${day}`;
                }
             }
             return ''; // Eğer geçerli tarih değilse boş döndür
        }
        // Use local time components to avoid timezone shifts
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        return '';
    }
}

function filtrele() {
    const aramaInput = document.getElementById('aramaKutusu');
    const durumInput = document.getElementById('durumFiltresi');
    const aramaFilter = aramaInput.value.toLocaleUpperCase('tr-TR');
    const durumFilter = durumInput.value.toUpperCase();
    const temizleBtn = document.getElementById('aramaTemizleBtn');
    let toplamGorunenSatir = 0;

    temizleBtn.style.display = aramaInput.value.length > 0 ? 'block' : 'none';
    
    const activeWrapper = document.querySelector('.table-wrapper.active');
    if (!activeWrapper) return;

    // Notlar sayfası için özel filtreleme
    if (activeWrapper.dataset.group === 'Notlar') {
        const muhendisFiltre = document.getElementById('notlarMuhendisFiltresi').value;
        const dataRows = activeWrapper.querySelectorAll("tbody tr");
        dataRows.forEach(row => {
            const muhendisCell = row.cells[3]; // Görevli Mühendis sütunu
            const rowDataText = row.textContent.toLocaleUpperCase('tr-TR');

            const muhendisMatch = (muhendisFiltre === '') || (muhendisCell.textContent.includes(muhendisFiltre));
            const aramaMatch = (aramaFilter === '') || rowDataText.includes(aramaFilter);

            const isMatch = muhendisMatch && aramaMatch;
            row.style.display = isMatch ? "" : "none";
            if (isMatch) toplamGorunenSatir++;
        });
        // Notlar sayfasında kayıt sayacı gösterilmiyor
        return;
    }


    if (activeWrapper.dataset.group === 'Tümü') {
        const tbodies = activeWrapper.querySelectorAll("tbody");
        tbodies.forEach(tbody => {
            const dataRows = tbody.querySelectorAll("tr:not(.group-header-row)");
            let groupVisibleRowCount = 0;
            dataRows.forEach(row => {
                const isMatch = checkRowMatch(row, aramaFilter, durumFilter);
                row.style.display = isMatch ? "" : "none";
                if (isMatch) groupVisibleRowCount++;
            });

            const headerRow = tbody.querySelector('.group-header-row');
            if(headerRow) {
                tbody.style.display = groupVisibleRowCount > 0 ? "" : "none";
                headerRow.querySelector('.group-count').textContent = groupVisibleRowCount;
            }
            toplamGorunenSatir += groupVisibleRowCount;
        });
    } else { 
        const dataRows = activeWrapper.querySelectorAll("tbody tr");
        dataRows.forEach(row => {
            const isMatch = checkRowMatch(row, aramaFilter, durumFilter);
            row.style.display = isMatch ? "" : "none";
            if (isMatch) toplamGorunenSatir++;
        });
    }

    document.getElementById('kayitSayaci').textContent = `Toplam ${toplamGorunenSatir} kayıt gösteriliyor.`;
    applyDistrictBorders();
}

function checkRowMatch(row, aramaFilter, durumFilter) {
    const isMainTable = row.closest('table').id !== 'guncellemeDetailTable' && row.closest('table').id !== 'komisyonTable';
    
    if (isMainTable) {
        const cells = row.getElementsByTagName("td");
        if (cells.length < 13) return true; // Header row vs. için koruma

        const ilceSelect = cells[1].querySelector('select');
        const birimInput = cells[2].querySelector('input');
        
        // Arama için tüm personelleri içeren bir metin oluştur
        const key = row.dataset.rowKey;
        const dataRow = isTakipData.find(r => r._ui_id === key);
        const personelText = (dataRow && dataRow['GÖREVLİ PERSONELLER']) ? dataRow['GÖREVLİ PERSONELLER'].toLocaleUpperCase('tr-TR') : "";

        const durumSelect = cells[cells.length - 1].querySelector('select');

        if (!ilceSelect || !birimInput || !durumSelect) return true;
        
        const ilceText = ilceSelect.value.toLocaleUpperCase('tr-TR');
        const birimText = birimInput.value.toLocaleUpperCase('tr-TR');
        const durumText = durumSelect.value.toUpperCase();
        
        const combinedText = `${ilceText} ${birimText} ${personelText}`;
        const textMatch = aramaFilter === '' || combinedText.includes(aramaFilter);
        const durumMatch = durumFilter === '' || durumText === durumFilter;
        return textMatch && durumMatch;
    } else if (row.closest('table').id === 'komisyonTable') {
        const cells = row.getElementsByTagName("td");
        if (cells.length < 4) return true;
        
        const ilceText = cells[0].textContent.toLocaleUpperCase('tr-TR');
        const birimText = cells[1].textContent.toLocaleUpperCase('tr-TR');
        const personelText = cells[3].textContent.toLocaleUpperCase('tr-TR'); // Komisyon personeli sütunu
        
        const combinedText = `${ilceText} ${birimText} ${personelText}`;
        return aramaFilter === '' || combinedText.includes(aramaFilter);
    } else { // Güncelleme Detay Tablosu
        const cells = row.getElementsByTagName("td");
        // Görünen hücre sayısı artık daha az
        if (cells.length < DISPLAY_HEADERS_DETAIL.length) return true; // Başlık sayısı ile karşılaştır

        const ilceInput = cells[0].querySelector('input'); // Gerçekte gizli ama veriyi buradan alıyoruz
        const birimInput = cells[1].querySelector('input');
        if(!ilceInput || !birimInput) return true;
        
        const ilceText = ilceInput.value.toLocaleUpperCase('tr-TR');
        const birimText = birimInput.value.toLocaleUpperCase('tr-TR');
        const combinedText = `${ilceText} ${birimText}`;
        
        // Detay sayfasında durum filtresi uygulanmaz, sadece metin araması
        return aramaFilter === '' || combinedText.includes(aramaFilter);
    }
}

function excelIndir() {
    const mainData = getTableDataFromUI();
    const detailData = getGuncellemeDetailDataFromUI();
    const wb = XLSX.utils.book_new();
    const wsMain = XLSX.utils.json_to_sheet(mainData, {header: EXCEL_HEADERS_MAIN});
    wsMain['!cols'] = getColumnWidths(mainData, EXCEL_HEADERS_MAIN);
    XLSX.utils.book_append_sheet(wb, wsMain, 'İş Takip Listesi');
    const wsDetail = XLSX.utils.json_to_sheet(detailData, {header: EXCEL_HEADERS_DETAIL});
    wsDetail['!cols'] = getColumnWidths(detailData, EXCEL_HEADERS_DETAIL);
    XLSX.utils.book_append_sheet(wb, wsDetail, 'Güncelleme Detay');
    XLSX.writeFile(wb, `IhaleTakip_Indirilen_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function getColumnWidths(data, headers) {
    const widths = headers.map(header => ({ wch: header.length })); 
    data.forEach(row => {
        headers.forEach((header, i) => {
            const cellValue = row[header] ? String(row[header]) : '';
            if (cellValue.length > widths[i].wch) {
                widths[i].wch = cellValue.length;
            }
        });
    });
    widths.forEach(width => {
        width.wch = Math.min(Math.max(width.wch, 10), 40) + 2;
    });
    return widths;
}

function applyDistrictBorders() {
    const activeTable = document.querySelector('.table-wrapper.active table');
    if (!activeTable) return;
    const tableWrapper = activeTable.closest('.table-wrapper');
    if (!tableWrapper) return;

    // Stil ve etiketleri temizle
    tableWrapper.style.position = 'relative'; // Konumlandırma için
    tableWrapper.querySelectorAll('.district-label').forEach(label => label.remove());
    
    const rows = activeTable.querySelectorAll('tbody tr:not(.group-header-row)');
    rows.forEach(row => { row.style.borderTop = ''; });
    
    const colors = ['#ff6347', '#4682b4', '#32cd32', '#ff8c00', '#9370db', '#00ced1', '#f08080'];
    let colorIndex = 0;
    let lastIlce = null;
    const isDetailTable = activeTable.id === 'guncellemeDetailTable';
    const isKomisyonTable = activeTable.id === 'komisyonTable';
    // Komisyon tablosunda İlçe 0. index'te, ana tabloda 1, detayda 0.
    const ilceColumnIndex = (isDetailTable || isKomisyonTable) ? 0 : 1;
    
    const tableWrapperRect = tableWrapper.getBoundingClientRect();

    rows.forEach(row => {
        if (row.style.display === 'none') return; 

        const ilceCell = row.cells[ilceColumnIndex];
        if (!ilceCell) return;
        
        let currentIlce = "";
        const currentIlceElement = ilceCell.querySelector('select, input');
        
        if (currentIlceElement) {
            currentIlce = currentIlceElement.value;
        } else {
            // Komisyon tablosunda input yok düz metin
            currentIlce = ilceCell.textContent;
        }

        if (currentIlce && currentIlce !== lastIlce) {
            const color = colors[colorIndex % colors.length];
            row.style.borderTop = `3px solid ${color}`;

            const label = document.createElement('div');
            label.className = 'district-label';
            label.textContent = currentIlce;
            label.style.backgroundColor = color;
            label.style.position = 'absolute';
            label.style.top = (row.getBoundingClientRect().top - tableWrapperRect.top - 9) + 'px';

            if (isDetailTable || isKomisyonTable) {
                 label.style.left = '5px';
            } else {
                const referenceCell = row.cells[ilceColumnIndex - 1]; // Checkbox cell
                if(referenceCell) {
                   label.style.left = (referenceCell.getBoundingClientRect().right - tableWrapperRect.left) + 'px';
                }
            }
            
            tableWrapper.appendChild(label);

            colorIndex++;
            lastIlce = currentIlce;
        }
    });
}

function setupTopScrollbar() {
    const tableContainer = document.getElementById('tableContainer');
    const topScrollbarWrapper = document.getElementById('top-scrollbar-wrapper');
    const topScrollbarContent = document.getElementById('top-scrollbar-content');
    const hasOverflow = tableContainer.scrollWidth > tableContainer.clientWidth;
    topScrollbarWrapper.style.display = hasOverflow ? 'block' : 'none';

    if (!hasOverflow) return;

    topScrollbarContent.style.width = tableContainer.scrollWidth + 'px';
    let isSyncing = false;
    tableContainer.onscroll = function() {
        if (isSyncing) return;
        isSyncing = true;
        topScrollbarWrapper.scrollLeft = tableContainer.scrollLeft;
        isSyncing = false;
    };
    topScrollbarWrapper.onscroll = function() {
        if (isSyncing) return;
        isSyncing = true;
        tableContainer.scrollLeft = topScrollbarWrapper.scrollLeft;
        isSyncing = false;
    };
}

function applyStickyColumns() {
    const activeTable = document.querySelector('.table-wrapper.active table:not(#guncellemeDetailTable):not(#komisyonTable)');
    if (!activeTable) return;

    activeTable.querySelectorAll('thead th, tbody tr:not(.group-header-row) td').forEach(cell => {
        cell.classList.remove('sticky-col');
        cell.style.left = '';
    });

    const rows = activeTable.querySelectorAll('thead tr, tbody tr:not(.group-header-row)');
    rows.forEach(row => {
        let leftOffset = 0;
        const cells = row.querySelectorAll('th, td');
        for (let i = 0; i < STICKY_COLS_COUNT; i++) {
            if (cells[i] && window.getComputedStyle(cells[i]).display !== 'none') {
                cells[i].classList.add('sticky-col');
                cells[i].style.left = leftOffset + 'px';
                leftOffset += cells[i].getBoundingClientRect().width;
            }
        }
    });
}

function extractDateFromNote(note) {
    if (!note) return null;
    // GG.AA.YYYY veya GG/AA/YYYY veya GG-AA-YYYY formatlarını ara
    const regex = /(\d{1,2})[./-](\d{1,2})[./-](\d{4})/; 
    const match = note.match(regex);
    if (match) {
        let day = parseInt(match[1], 10);
        let month = parseInt(match[2], 10) - 1; // JS months are 0-indexed
        let year = parseInt(match[3], 10);

        // Tarih geçerliliğini basitçe kontrol et
        if (day > 0 && day <= 31 && month >= 0 && month <= 11 && year > 1900 && year < 2100) {
            return new Date(year, month, day);
        }
    }
    return null; // Eşleşme yoksa veya geçersiz tarih ise null döndür
}
