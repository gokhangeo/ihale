        Not Raporunu Excel'e Aktar
    `;
    excelButton.onclick = excelIndirNotlar;
    
    const muhendisSelect = document.createElement('select');
    muhendisSelect.id = 'notlarMuhendisFiltresi';
    muhendisSelect.onchange = filtrele;
    muhendisSelect.innerHTML = '<option value="">Tüm Mühendisler</option>';
    muhendisListesi.forEach(m => {
        const muhendisAdi = m.replace(/ \(.+\)$/, '').trim(); // Unvansız adı al
        muhendisSelect.options.add(new Option(m, muhendisAdi)); // Değer olarak unvansız adı kullan
    });

    filterContainer.appendChild(excelButton);
    filterContainer.appendChild(muhendisSelect);
    container.appendChild(filterContainer);

    // Tablo
    const table = document.createElement('table');
    table.id = 'notlar-table';
    table.innerHTML = `<thead><tr><th style="width: 10%;">UYGULAMA</th><th style="width: 10%;">İLÇE</th><th style="width: 15%;">BİRİM</th><th style="width: 15%;">GÖREVLİ MÜHENDİS</th><th style="width: 50%;">NOT</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    
    const notesWithData = isTakipData
        .filter(row => {
            if (!row['NOTLAR'] || row['NOTLAR'].trim() === '') return false;
            
            // Bilgilendirme ilanı tarihi girilmişse gizle
            const detailRow = guncellemeData.find(d => d['İLÇE'] === row['İLÇE'] && d['BİRİM'] === row['BİRİM']);
            if (detailRow && detailRow['BİLGİLENDİRME İLANI TARİHİ']) return false;
            
            // Tarih unutulma ihtimaline karşı durumdan da teyit et
            const ileriDurumlar = ['BİLGİLENDİRME İLANINDA', 'KOMİSYON AŞAMASINDA', 'KESİN ASKIDA', 'DEVİR YAPILDI', 'TESCİL AŞAMASINDA', 'TESCİLİ BİTTİ'];
            if (ileriDurumlar.includes(row['DURUMU'])) return false;

            return true;
        })
        .map(row => {
            const rawNote = row['NOTLAR'] || '';
            // Ardışık satır boşluklarını temizle
            const cleaned = rawNote.replace(/(\r\n|\n|\r)+/g, '\n').trim();
            // Numaralandırma işlemi
            const lines = cleaned.split('\n');
            let formattedNote = '';
            
            // Biz burada sadece düz metin olarak kaydediyoruz, gösterirken HTML listesi yapıyoruz
            // Ancak, düzenleme modunda düz metin görünmeli.
            // Bu yüzden "displayHTML" diye ayrı bir alan tutalım.
            
             let displayHTML = '<div class="note-content-wrapper"><ol class="note-list">';
                 lines.forEach(line => {
                     // Var olan numaraları temizle (örn: "1. Not" -> "Not")
                     const content = line.replace(/^\d+[\.\)]\s*/, '').trim();
                     if(content !== '') {
                         displayHTML += `<li>${content}</li>`;
                     }
                 });
                 displayHTML += '</ol></div><span class="expand-icon">▼ Detay ▼</span>';

            return { 
                ...row, 
                cleanNote: cleaned,
                displayHTML: displayHTML,
                extractedDate: extractDateFromNote(cleaned) 
            };
        });

    notesWithData.sort((a, b) => {
        const dateA = a.extractedDate;
        const dateB = b.extractedDate;
        if (dateA && dateB) return dateA - dateB; // Tarihe göre sırala (Eskiden yeniye)
        if (dateA) return -1;
        if (dateB) return 1;
        return 0;
    });

    notesWithData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'note-row';
        const rowKey = row._ui_id;
        tr.dataset.rowKey = rowKey;
        tr.dataset.uygulama = row['UYGULAMA'];
        
        // Tamamlandı durumunu ekle
        if(row['Tamamlandı'] === 'EVET') {
            tr.classList.add('tamamlandi');
        }

        const engineers = (row['GÖREVLİ PERSONELLER'] || '')
            .split(', ')
            .map(name => name.trim())
            .filter(name => {
                const fullName = fullPersonelListesi.find(p => p.toLocaleUpperCase('tr-TR').startsWith(name.toLocaleUpperCase('tr-TR')));
                return fullName && muhendisListesi.includes(fullName);
            })
            .join(', ');

        tr.innerHTML = `
            <td>${row['UYGULAMA']}</td>
            <td>${row['İLÇE']}</td>
            <td>${row['BİRİM']}</td>
            <td class="muhendis-cell">${engineers}</td>
            <td class="note-cell" title="Açmak/Kapatmak veya Düzenlemek İçin Tıklayın">${row['displayHTML']}</td>
        `;
        
        // Düzenleme moduna geçiş
        tr.querySelector('.note-cell').addEventListener('dblclick', function(e) {
            e.stopPropagation();
            if (this.querySelector('.note-edit-container')) return;
            
            // Düzenleme modunda ham metni (temizlenmiş) göster
            const noteText = row['cleanNote'];

            this.innerHTML = `
                <div class="note-edit-container">
                    <textarea rows="8">${noteText || ''}</textarea>
                    <div class="note-edit-buttons">
                        <button class="note-delete-inline danger">Sil</button>
                        <button class="note-save-inline success">Kaydet</button>
                    </div>
                </div>
            `;

            this.querySelector('.note-save-inline').addEventListener('click', (e) => {
                e.stopPropagation(); // Satır tıklamasını engelle
                const newNote = this.querySelector('textarea').value;
                const cleanedNewNote = newNote.replace(/(\r\n|\n|\r)+/g, '\n').trim();
                
                const dataRow = isTakipData.find(r => r._ui_id === rowKey);
                dataRow['NOTLAR'] = cleanedNewNote;
                
                // Ekranı güncelle
                const lines = cleanedNewNote.split('\n');
                let newDisplayHTML = '<div class="note-content-wrapper"><ol class="note-list">';
                 lines.forEach(line => {
                     const content = line.replace(/^\d+[\.\)]\s*/, '').trim();
                     if(content !== '') {
                         newDisplayHTML += `<li>${content}</li>`;
                     }
                 });
                 newDisplayHTML += '</ol></div><span class="expand-icon">▼ Detay ▼</span>';
                 
                row['cleanNote'] = cleanedNewNote;
                row['displayHTML'] = newDisplayHTML;
                this.innerHTML = newDisplayHTML;
                this.classList.remove('expanded'); // Kaydettikten sonra kapalı gelsin
                
                document.querySelectorAll(`tr[data-row-key="${rowKey}"] .not-btn`).forEach(btn => {
                    btn.classList.toggle('has-note', cleanedNewNote && cleanedNewNote.trim() !== '');
                });
                
                if (!cleanedNewNote || cleanedNewNote.trim() === '') {
                    tr.remove();
                }
                markAsDirty();
                showToast('Not güncellendi. Kaydetmeyi unutmayın.');
            });

            this.querySelector('.note-delete-inline').addEventListener('click', (e) => {
                e.stopPropagation();
                const dataRow = isTakipData.find(r => r._ui_id === rowKey);
                dataRow['NOTLAR'] = '';
                tr.remove();
                document.querySelectorAll(`tr[data-row-key="${rowKey}"] .not-btn`).forEach(btn => {
                    btn.classList.remove('has-note');
                });
                markAsDirty();
                showToast('Not silindi. Kaydetmeyi unutmayın.');
            });
            
            // Textarea'ya tıklandığında satır olayını engelle
            this.querySelector('textarea').addEventListener('click', (e) => e.stopPropagation());
        });


        tbody.appendChild(tr);
    });

    // Satır atlama işlevselliği
    tbody.addEventListener('dblclick', (e) => {
        // Eğer tıklanan element düzenleme alanındaysa işlem yapma
        if (e.target.closest('.note-edit-container')) return;

        const row = e.target.closest('.note-row');
        // Not hücresine çift tıkladıysa satır atlama yapma, düzenlemeye geçsin
        if (row && !e.target.closest('.note-cell')) {
            const rowKey = row.dataset.rowKey;
            const uygulama = row.dataset.uygulama;

            let targetTab = 'Tümü'; 
            
            const tabBtn = Array.from(document.querySelectorAll('#tabs .tab-btn')).find(btn => 
                btn.textContent.includes(uygulama) || btn.dataset.uygulama === uygulama
            );
            
            if(tabBtn) {
                 targetTab = tabBtn.dataset.uygulama;
            } else if (uygulama === 'GÜNCELLEME') {
                 targetTab = 'GÜNCELLEME';
            }

            const dataRow = isTakipData.find(r => r._ui_id === rowKey);
            if(dataRow && dataRow['İHALELİ/MÜDÜRLÜK'] === 'Müdürlük') {
                targetTab = 'Müdürlük';
            }
            
            if(targetTab) {
                showTab(targetTab);
                setTimeout(() => {
                    const targetRow = document.querySelector(`.table-wrapper.active tr[data-row-key="${rowKey}"]`);
                    if(targetRow){
                        targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetRow.style.transition = 'background-color 0.5s';
                        targetRow.style.backgroundColor = '#fff3cd';
                        setTimeout(() => {
                            targetRow.style.backgroundColor = '';
                        }, 2000);
                    }
                }, 100);
            }
        }
    });

    table.appendChild(tbody);
    container.appendChild(table);
    return container;
}

function excelIndirNotlar() {
    const noteData = isTakipData
        .filter(row => {
            if (!row['NOTLAR'] || row['NOTLAR'].trim() === '') return false;
            
            // Excel indirmesinde de bilgilendirme ilanına çıkanları gizle
            const detailRow = guncellemeData.find(d => d['İLÇE'] === row['İLÇE'] && d['BİRİM'] === row['BİRİM']);
            if (detailRow && detailRow['BİLGİLENDİRME İLANI TARİHİ']) return false;
            
            const ileriDurumlar = ['BİLGİLENDİRME İLANINDA', 'KOMİSYON AŞAMASINDA', 'KESİN ASKIDA', 'DEVİR YAPILDI', 'TESCİL AŞAMASINDA', 'TESCİLİ BİTTİ'];
            if (ileriDurumlar.includes(row['DURUMU'])) return false;

            return true;
        })
        .map(row => ({ ...row, extractedDate: extractDateFromNote(row['NOTLAR']) }))
        .sort((a, b) => {
            const dateA = a.extractedDate;
            const dateB = b.extractedDate;
            if (dateA && dateB) return dateA - dateB;
            if (dateA) return -1;
            if (dateB) return 1;
            return 0;
        });

    const groupedByIlce = noteData.reduce((acc, row) => {
        const ilce = row['İLÇE'];
        if (!acc[ilce]) acc[ilce] = [];
        acc[ilce].push(row);
        return acc;
    }, {});

    const headers = ['UYGULAMA', 'İLÇE', 'BİRİM', 'GÖREVLİ MÜHENDİS', 'NOT'];
    const excelData = [];
    
    // Filtrelenmiş mühendisi al (varsa)
    const muhendisFiltre = document.getElementById('notlarMuhendisFiltresi').value;

    Object.keys(groupedByIlce).sort().forEach(ilce => {
        excelData.push([ilce]); // İlçe başlık satırı
        excelData.push(headers); // Sütun başlıkları

        let ilceData = groupedByIlce[ilce];
        
        // Mühendis filtresi uygulanmışsa veriyi filtrele
        if (muhendisFiltre !== '') {
            ilceData = ilceData.filter(row => {
                const engineers = (row['GÖREVLİ PERSONELLER'] || '')
                    .split(', ')
                    .map(name => name.trim())
                    .filter(name => {
                        const fullName = fullPersonelListesi.find(p => p.toLocaleUpperCase('tr-TR').startsWith(name.toLocaleUpperCase('tr-TR')));
                        return fullName && muhendisListesi.includes(fullName);
                    });
                
                // Unvansız isim listesi oluştur
                const unvansizEngineers = engineers.map(e => e.replace(/ \(.+\)$/, '').trim());
                return unvansizEngineers.includes(muhendisFiltre);
            });
        }
        
        ilceData.forEach(row => {
            const engineers = (row['GÖREVLİ PERSONELLER'] || '')
                .split(', ')
                .map(name => name.trim())
                .filter(name => {
                    const fullName = fullPersonelListesi.find(p => p.toLocaleUpperCase('tr-TR').startsWith(name.toLocaleUpperCase('tr-TR')));
                    return fullName && muhendisListesi.includes(fullName);
                })
                .join(', ');
            
            // Excel çıktısı için de notu temizle ve numaralandır
            const rawNote = row['NOTLAR'] || '';
            const cleanedNote = rawNote.replace(/(\r\n|\n|\r)+/g, '\n').trim();
            const lines = cleanedNote.split('\n');
            let excelNoteFormat = '';
            lines.forEach((line, index) => {
                 const content = line.replace(/^\d+[\.\)]\s*/, '').trim();
                 if(content !== '') {
                     excelNoteFormat += `${index + 1}. ${content}\n`;
                 }
            });


            excelData.push([
                row['UYGULAMA'],
                row['İLÇE'],
                row['BİRİM'],
                engineers,
                excelNoteFormat.trim()
            ]);
        });
        excelData.push([]); // İlçeler arasına boş satır
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(excelData);
    
    // Sütun genişliklerini ayarla (Not sütunu daha geniş)
    ws['!cols'] = [ { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 30 }, { wch: 60 } ];
    
    // Stil tanımları
    const headerStyle = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "007BFF" } } };
    const ilceHeaderStyle = { font: { bold: true, sz: 14, color: { rgb: "0056B3" } }, fill: { fgColor: { rgb: "E7F1FF" } } };

    // Stilleri uygulama
    for (let R = 0; R < excelData.length; ++R) {
        if (excelData[R].length === 1) { // İlçe Başlığı
            const cellRef = XLSX.utils.encode_cell({c: 0, r: R});
            if(!ws[cellRef]) ws[cellRef] = {};
            ws[cellRef].s = ilceHeaderStyle;
            // Hücreleri birleştir
            if (!ws['!merges']) ws['!merges'] = [];
            ws['!merges'].push({ s: { r: R, c: 0 }, e: { r: R, c: headers.length - 1 } });
        } else if (excelData[R].join(',') === headers.join(',')) { // Sütun Başlıkları
            for(let C = 0; C < headers.length; ++C) {
                const cellRef = XLSX.utils.encode_cell({c: C, r: R});
                if(!ws[cellRef]) ws[cellRef] = {};
                ws[cellRef].s = headerStyle;
            }
        }
    }

    XLSX.utils.book_append_sheet(wb, ws, 'Not Raporu');
    XLSX.writeFile(wb, `NotRaporu_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function createSummaryCards() {
    const container = document.getElementById('summary-cards-container');
    container.innerHTML = '';
    const groups = {
        '2/B': { data: isTakipData.filter(r => r['UYGULAMA'] === '2/B' && r['İHALELİ/MÜDÜRLÜK'] !== 'Müdürlük'), colorClass: 'card-2b' },
        'GÜNCELLEME': { data: isTakipData.filter(r => r['UYGULAMA'] === 'GÜNCELLEME' && r['İHALELİ/MÜDÜRLÜK'] !== 'Müdürlük'), colorClass: 'card-guncelleme' },
        'Müdürlük': { data: isTakipData.filter(r => r['İHALELİ/MÜDÜRLÜK'] === 'Müdürlük'), colorClass: 'card-mudurluk' }
    };

    for (const groupName in groups) {
        const group = groups[groupName];
        if (group.data.length === 0) continue;

        const card = document.createElement('div');
        card.className = `summary-card ${group.colorClass}`;
        card.dataset.uygulama = groupName;

        const totalCount = group.data.length;
        const statusCounts = group.data.reduce((acc, row) => {
            const status = row['DURUMU'] || 'Belirsiz';
            acc[status] = (acc[status] || 0) + 1;
            return acc;
        }, {});
        
        let projectStartDate = null;
        let projectEndDate = null;
        
        if (groupName === 'GÜNCELLEME') {
             group.data.forEach(job => {
                const detailRow = guncellemeData.find(d => d['İLÇE'] === job['İLÇE'] && d['BİRİM'] === job['BİRİM']);
                if (detailRow) {
                    const startDate = excelDateToJSDate(detailRow['İŞE BAŞLAMA']);
                    const endDate = excelDateToJSDate(detailRow['BİTİŞ TARİHİ']);
                    if (startDate instanceof Date && !isNaN(startDate)) {
                        if (!projectStartDate || startDate < projectStartDate) projectStartDate = startDate;
                    }
                    if (endDate instanceof Date && !isNaN(endDate)) {
                        if (!projectEndDate || endDate > projectEndDate) projectEndDate = endDate;
                    }
                }
            });
        }

        let breakdownHTML = '<div class="status-breakdown">';
        Object.entries(statusCounts).sort((a,b) => b[1] - a[1]).forEach(([status, count]) => {
            let detailListHTML = '';
            // GÜNCELLEME kartına özel tarih bilgisi ekle
            if (groupName === 'GÜNCELLEME') {
                const jobsInStatus = group.data.filter(job => (job['DURUMU'] || 'Belirsiz') === status);
                detailListHTML += '<ul>';
                jobsInStatus.forEach(job => {
                    const detailRow = guncellemeData.find(d => d['İLÇE'] === job['İLÇE'] && d['BİRİM'] === job['BİRİM']);
                    let dateInfo = '';
                    if (detailRow) {
                        const startDate = formatDate(excelDateToJSDate(detailRow['İŞE BAŞLAMA']));
                        const endDate = formatDate(excelDateToJSDate(detailRow['BİTİŞ TARİHİ']));
                        
                        if (startDate && endDate) {
                            dateInfo = ` (${startDate} - ${endDate})`;
                        } else if (startDate) {
                            dateInfo = ` (${startDate} - ...)`;
                        } else if (endDate) {
                             dateInfo = ` (... - ${endDate})`;
                        }
                    }
                    detailListHTML += `<li><span>${job['İLÇE']} - ${job['BİRİM']}</span><span class="item-dates">${dateInfo}</span></li>`;
                });
                detailListHTML += '</ul>';
            }
             breakdownHTML += `<div class="status-item" data-status="${status}">
                                 <span>${status}${detailListHTML}</span>
                                 <strong>${count}</strong>
                             </div>`;
        });
        breakdownHTML += '</div>';

        let dateRangeHTML = '';
        if (projectStartDate && projectEndDate) {
            dateRangeHTML = `<span class="project-date-range">Proje Tarih Aralığı: ${formatDate(projectStartDate)} - ${formatDate(projectEndDate)}</span>`;
        }


        card.innerHTML = `
            <h3>${groupName} İşleri</h3>
            <div class="card-content">
                <p class="total-count">${totalCount} İş</p>
                ${dateRangeHTML}
                ${breakdownHTML}
            </div>
        `;
        
        container.appendChild(card);
    }
}



function createPersonelReport() {
    const reportContainer = document.createElement('div');

    const muhendisReportData = {};
    const teknikerReportData = {};

    isTakipData.forEach(is => {
        const personeller = is['GÖREVLİ PERSONELLER'] ? String(is['GÖREVLİ PERSONELLER']).split(', ') : [];
        personeller.forEach(pName => {
            const pNameUpper = pName.trim().toLocaleUpperCase('tr-TR');
            const personelFullName = fullPersonelListesi.find(p => p.toLocaleUpperCase('tr-TR').startsWith(pNameUpper));
            
            if (personelFullName) {
                let reportData;
                if (muhendisListesi.includes(personelFullName)) {
                    reportData = muhendisReportData;
                } else if (teknikerListesi.includes(personelFullName)) {
                    reportData = teknikerReportData;
                } else {
                    return; // Skip if not in either list
                }

                if (!reportData[personelFullName]) {
                    reportData[personelFullName] = {};
                }
                const durum = is['DURUMU'] || 'Belirtilmemiş';
                if (!reportData[personelFullName][durum]) {
                    reportData[personelFullName][durum] = [];
                }
                reportData[personelFullName][durum].push(`${is['İLÇE']} - ${is['BİRİM']}`);
            }
        });
    });
    
    // Helper function to render a section
    const renderSection = (data, title) => {
        if (Object.keys(data).length === 0) return; // Don't render empty sections

        const titleEl = document.createElement('h2');
        titleEl.textContent = title;
        reportContainer.appendChild(titleEl);

        const sectionContainer = document.createElement('div');
        sectionContainer.className = 'personel-rapor-container';

        // Sort personnel names alphabetically before rendering
        const sortedPersonnel = Object.keys(data).sort((a, b) => a.localeCompare(b, 'tr-TR'));

        sortedPersonnel.forEach(personel => {
            const kart = document.createElement('div');
            kart.className = 'personel-kart';
            
            const durumGruplari = Object.keys(data[personel]).sort();
            let toplamIsSayisi = 0;
            durumGruplari.forEach(durum => {
                toplamIsSayisi += data[personel][durum].length;
            });

            let kartHTML = `<h4 onclick="togglePersonelDetay(this)">${personel} (${toplamIsSayisi} iş)</h4>`;
            kartHTML += '<div class="personel-kart-icerik">';
            
            durumGruplari.forEach(durum => {
                kartHTML += `<div class="durum-grup"><strong>${durum} (${data[personel][durum].length} iş):</strong><ul>`;
                data[personel][durum].sort().forEach(isDetay => {
                    kartHTML += `<li>${isDetay}</li>`;
                });
                kartHTML += `</ul></div>`;
            });

            kartHTML += '</div>';
            kart.innerHTML = kartHTML;
            sectionContainer.appendChild(kart);
        });
        reportContainer.appendChild(sectionContainer);
    };

    renderSection(muhendisReportData, 'Mühendis Durum Raporu');
    renderSection(teknikerReportData, 'Tekniker Durum Raporu');
    
    return reportContainer;
}

function createIlceReport() {
    const reportContainer = document.createElement('div');
    reportContainer.className = 'ilce-rapor-container';

    const ilceData = {};

    isTakipData.forEach(is => {
        const ilce = is['İLÇE'];
        if (!ilce) return;

        if (!ilceData[ilce]) {
            ilceData[ilce] = {};
        }

        const uygulama = is['UYGULAMA'] || 'Diğer';
        if (!ilceData[ilce][uygulama]) {
            ilceData[ilce][uygulama] = [];
        }
        ilceData[ilce][uygulama].push({
            birim: is['BİRİM'],
            durum: is['DURUMU'] || 'Belirtilmemiş'
        });
    });

    const sortedIlceler = Object.keys(ilceData).sort((a, b) => a.localeCompare(b, 'tr-TR'));

    sortedIlceler.forEach(ilce => {
        const kart = document.createElement('div');
        kart.className = 'ilce-kart';
        
        let toplamIsSayisi = 0;
        Object.keys(ilceData[ilce]).forEach(uygulama => {
            toplamIsSayisi += ilceData[ilce][uygulama].length;
        });

        let kartHTML = `<h4 onclick="toggleIlceDetay(this)">${ilce} (${toplamIsSayisi} iş)</h4>`;
        kartHTML += '<div class="ilce-kart-icerik">';
        
        Object.keys(ilceData[ilce]).sort().forEach(uygulama => {
            const isler = ilceData[ilce][uygulama];
            kartHTML += `<div class="uygulama-grup"><strong>${uygulama} (${isler.length} iş):</strong><ul>`;
            isler.sort((a,b) => a.birim.localeCompare(b.birim, 'tr-TR')).forEach(is => {
                kartHTML += `<li>${is.birim} <span>(${is.durum})</span></li>`;
            });
            kartHTML += `</ul></div>`;
        });

        kartHTML += '</div>';
        kart.innerHTML = kartHTML;
        reportContainer.appendChild(kart);
    });
    
    return reportContainer;
}

function toggleIlceDetay(headerElement) {
    const content = headerElement.nextElementSibling;
    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}


function togglePersonelDetay(headerElement) {
    const content = headerElement.nextElementSibling;
    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}


window.addEventListener('resize', () => {
    setupTopScrollbar();
    applyStickyColumns();
    applyDistrictBorders();
});

</script>
